<div class="login-wrapper">

  <!-- Panel izquierdo: logo -->
  <div class="login-left">
    <div class="left-content">
      <div class="company-logo">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRvXxvezRkQaU5JgcEatIZhpiSSU1hKiOklEojAb-dkleSxYwEXMWsxGM&s=10" alt="Valdez y Cía" />
      </div>
      <h1>Valdez y Cía</h1>
      <p>Sistema de gestión de hacienda</p>
    </div>
  </div>

  <!-- Panel derecho: formularios -->
  <div class="login-right">

    <!-- ── LOGIN ──────────────────────────────────────────────────────── -->
    <div class="login-card" *ngIf="step === 'login'" [class.shake]="loginShake">
      <div class="card-header">
        <h2>Iniciar sesión</h2>
        <p>Accedé a tu cuenta para continuar</p>
      </div>

      <form (ngSubmit)="onLogin()" autocomplete="off">
        <div class="field-group">
          <label>Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
            <input type="email" [(ngModel)]="loginEmail" name="email"
              placeholder="tucorreo@valdezcia.com"
              [class.error-input]="loginError" autocomplete="email" />
          </div>
        </div>

        <div class="field-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
            <input [type]="showLoginPass ? 'text' : 'password'" [(ngModel)]="loginPassword" name="password"
              placeholder="Tu contraseña"
              [class.error-input]="loginError" autocomplete="current-password" />
            <button type="button" class="toggle-pass" (click)="showLoginPass = !showLoginPass">
              <svg *ngIf="!showLoginPass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
              <svg *ngIf="showLoginPass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" *ngIf="loginError">
          <span class="error-icon">✕</span>
          <span>{{ loginError }}</span>
        </div>

        <button type="submit" class="btn-primary" [class.loading]="loginLoading" [disabled]="loginLoading">
          <span *ngIf="!loginLoading">Ingresar</span>
          <span *ngIf="loginLoading" class="spinner"></span>
        </button>
      </form>

      <div class="switch-mode">
        ¿No tenés cuenta?
        <button type="button" (click)="goTo('register')">Registrate</button>
      </div>
    </div>

    <!-- ── REGISTRO ────────────────────────────────────────────────────── -->
    <div class="login-card anim-slide" *ngIf="step === 'register'" [class.shake]="regShake">
      <div class="card-header">
        <h2>Crear cuenta</h2>
        <p>Ingresá tu cédula y elegí tus credenciales de acceso</p>
      </div>

      <form (ngSubmit)="onRegister()" autocomplete="off">

        <div class="field-group">
          <label>Cédula de identidad</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z" />
            </svg>
            <input type="text" inputmode="numeric" [(ngModel)]="regCi" name="regCi"
              placeholder="Ej. 12345678" autocomplete="off" />
          </div>
        </div>

        <div class="field-group">
          <label>Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
            <input type="email" [(ngModel)]="regEmail" name="regEmail"
              placeholder="tucorreo@valdezcia.com" autocomplete="off" />
          </div>
        </div>

        <div class="field-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
            <input [type]="showRegPass ? 'text' : 'password'" [(ngModel)]="regPassword" name="regPassword"
              placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pass" (click)="showRegPass = !showRegPass">
              <svg *ngIf="!showRegPass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
              <svg *ngIf="showRegPass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <div class="field-group">
          <label>Confirmar contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
            </svg>
            <input [type]="showRegConfirm ? 'text' : 'password'" [(ngModel)]="regConfirm" name="regConfirm"
              placeholder="Repetí la contraseña" autocomplete="new-password" />
            <button type="button" class="toggle-pass" (click)="showRegConfirm = !showRegConfirm">
              <svg *ngIf="!showRegConfirm" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
              <svg *ngIf="showRegConfirm" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" *ngIf="regError">
          <span class="error-icon">✕</span>
          <span>{{ regError }}</span>
        </div>

        <button type="submit" class="btn-primary" [class.loading]="regLoading" [disabled]="regLoading">
          <span *ngIf="!regLoading">Crear cuenta</span>
          <span *ngIf="regLoading" class="spinner"></span>
        </button>
      </form>

      <div class="switch-mode">
        ¿Ya tenés cuenta?
        <button type="button" (click)="goTo('login')">Iniciá sesión</button>
      </div>
    </div>

  </div>
</div>
