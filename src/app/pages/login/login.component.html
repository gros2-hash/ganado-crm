<div class="login-wrapper">
  <div class="login-left">
    <div class="brand">
      <span class="brand-icon">🐄</span>
      <span class="brand-name">GanadoCRM</span>
    </div>
    <h1>Gestión integral<br>de lotes de ganado</h1>
    <p>Compra, venta y administración de hacienda en una sola plataforma.</p>
    <div class="stats-preview">
      <div class="stat"><span class="stat-num">1.240</span><span class="stat-label">Cabezas activas</span></div>
      <div class="stat"><span class="stat-num">38</span><span class="stat-label">Lotes en gestión</span></div>
      <div class="stat"><span class="stat-num">$2.4M</span><span class="stat-label">Facturación mensual</span></div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <div class="card-header">
        <h2>Iniciar sesión</h2>
        <p>Accedé a tu cuenta para continuar</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" autocomplete="off">
        <div class="field-group">
          <label for="username">Usuario</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              id="username"
              type="text"
              [(ngModel)]="username"
              name="username"
              placeholder="Ingresá tu usuario"
              [class.error-input]="error"
              autocomplete="username"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Ingresá tu contraseña"
              [class.error-input]="error"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="error-msg" *ngIf="error">
          <span>⚠️</span> {{ error }}
        </div>

        <div class="demo-hint">
          <span>💡</span> Demo: <strong>admin</strong> / <strong>ganado2024</strong>
        </div>

        <button type="submit" class="btn-login" [class.loading]="loading" [disabled]="loading">
          <span *ngIf="!loading">Ingresar →</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>
    </div>
  </div>
</div>
