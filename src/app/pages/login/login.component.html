<div class="login-wrapper">
  <div class="login-left">
    <div class="left-content">
      <div class="company-logo">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRvXxvezRkQaU5JgcEatIZhpiSSU1hKiOklEojAb-dkleSxYwEXMWsxGM&s=10"
          alt="Valdez y Cía"
        />
      </div>
      <h1>Valdez y Cía</h1>
      <p>Sistema de gestión de hacienda</p>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card" [class.shake]="shake">
      <div class="card-header">
        <h2>Iniciar sesión</h2>
        <p>Accedé a tu cuenta para continuar</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" autocomplete="off">
        <div class="field-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Ingresá tu email"
              [class.error-input]="error"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Ingresá tu contraseña"
              [class.error-input]="error"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="error-msg" *ngIf="error">
          <span class="error-icon">✕</span>
          <span>{{ error }}</span>
        </div>

        <button type="submit" class="btn-login" [class.loading]="loading" [disabled]="loading">
          <span *ngIf="!loading">Ingresar →</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>
    </div>
  </div>
</div>
