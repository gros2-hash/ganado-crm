<div class="user-menu" *ngIf="user">

  <button class="trigger" (click)="toggle()">
    <div class="avatar">{{ user.avatar }}</div>
    <div class="trigger-info">
      <span class="trigger-name">{{ user.name }}</span>
      <span class="trigger-role">{{ user.role }}</span>
    </div>
    <svg class="chevron" [class.rotated]="open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </svg>
  </button>

  <div class="dropdown" *ngIf="open">
    <div class="dropdown-header">
      <div class="dh-avatar">{{ user.avatar }}</div>
      <div class="dh-info">
        <span class="dh-name">{{ user.name }}</span>
        <span class="dh-email">{{ user.email }}</span>
        <span class="dh-role">{{ user.role }}</span>
      </div>
    </div>

    <div class="dropdown-divider"></div>

    <button class="dropdown-item logout-item" (click)="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
      </svg>
      Cerrar sesión
    </button>
  </div>

</div>
